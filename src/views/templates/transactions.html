<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-white mb-2">Solana Transactions</h1>
            <p class="text-purple-300">Latest {tx_display_count} transactions from the network</p>
        </div>
        
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white">
                        <tr>
                            <th class="px-4 py-4 text-left text-sm font-semibold">Signature</th>
                            <th class="px-4 py-4 text-left text-sm font-semibold">Time</th>
                            <th class="px-4 py-4 text-left text-sm font-semibold">Slot</th>
                            <th class="px-4 py-4 text-left text-sm font-semibold">Fee (lamports)</th>
                            <th class="px-4 py-4 text-left text-sm font-semibold">Status</th>
                            <th class="px-4 py-4 text-left text-sm font-semibold">Signer</th>
                            <th class="px-4 py-4 text-center text-sm font-semibold">Instructions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        {transaction_rows}
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="mt-6 text-center text-purple-300 text-sm">
            <p>Total: {total_transactions} transactions</p>
        </div>
    </div>
    <script>
        document.querySelectorAll('.tx-link').forEach(el => {{
            el.addEventListener('click', () => {{
                window.open('{tx_explorer_url}' + el.dataset.sig, '_blank');
            }});
        }});
    </script>
</body>
</html>
