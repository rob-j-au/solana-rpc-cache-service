global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "app"
    honor_labels: true
    static_configs:
      - targets:
          - "app:8080"
  
  - job_name: "postgres"
    honor_labels: true
    static_configs:
      - targets:
          - "postgres-exporter:9187"
